name: CI

on: [push, pull_request]

jobs:
  ci:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: actions/checkout@v5
      - run: cargo build --all
      - run: cargo fmt --all -- --check
      - run: cargo clippy -- -D warnings

      - run: cargo install cargo-tarpaulin
        if: matrix.os == 'ubuntu-latest'
      - run: cargo tarpaulin --out xml -- --test-threads 1
        if: matrix.os == 'ubuntu-latest'
      - name: Upload coverage report to codecov.io
        uses: codecov/codecov-action@v4
        with:
          # fail_ci_if_error is set to false so the build does not break
          # when CODECOV_TOKEN is not configured (e.g. in forks).
          # Set it to true and add the secret to enable strict enforcement.
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
        if: matrix.os == 'ubuntu-latest'
