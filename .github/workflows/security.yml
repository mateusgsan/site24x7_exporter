name: Security Checks

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  schedule:
    - cron: '0 0 * * 0' # Run weekly on Sunday

jobs:
  security-audit:
    name: Security Audit (SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          
      - name: Run Cargo Clippy (SAST)
        run: cargo clippy --all-targets --all-features -- -D warnings
        
      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit
        
      - name: Run Cargo Audit (Vulnerability Check)
        run: cargo audit
        
      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny
        
      - name: Run Cargo Deny (License & Advisory Check)
        run: cargo deny check advisories bans licenses sources

  sbom-generation:
    name: Generate SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        
      - name: Install cargo-sbom
        uses: taiki-e/install-action@cargo-sbom
        
      - name: Generate SBOM (SPDX)
        run: cargo sbom > sbom.spdx.json
        
      - name: Generate SBOM (CycloneDX)
        run: cargo sbom --output-format cyclonedx-json > sbom.cyclonedx.json
        
      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-files
          path: |
            sbom.spdx.json
            sbom.cyclonedx.json
          retention-days: 30
